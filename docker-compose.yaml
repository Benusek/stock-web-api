services:
  db:
    image: mysql
    volumes: 
      - ./db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    image: phpmyadmin
    ports:
      - "80:80"
    environment:
      PMA_HOST: db
    depends_on:
      db:
        condition: service_healthy
volumes:
  db-data: